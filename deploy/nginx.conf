# Coloca este archivo en /etc/nginx/sites-available/ecommerce-agent
# y crea el symlink: sudo ln -s /etc/nginx/sites-available/ecommerce-agent /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name tu-dominio-o-ip-publica;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Necesario si en el futuro agregas streaming de respuestas
        proxy_buffering off;
        proxy_read_timeout 120s;
    }
}
