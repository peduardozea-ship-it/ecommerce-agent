<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Asistente Virtual</title>
<style>
  :root {
    --bg: #0b0f19;
    --panel: #111827;
    --border: #2a3244;
    --text: #e5e7eb;
    --text-dim: #9ca3af;
    --accent: #f59e0b;
    --user-bubble: #1f2937;
    --bot-card: #151b28;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  header {
    padding: 24px 32px 8px 32px;
  }
  header h1 {
    margin: 0 0 6px 0;
    font-size: 1.6rem;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  header p {
    margin: 0;
    color: var(--text-dim);
    font-size: 0.95rem;
  }
  #chat-panel {
    flex: 1;
    margin: 16px 32px;
    border: 1px solid var(--border);
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--panel);
  }
  #chat-tab {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    color: var(--text-dim);
    font-size: 0.85rem;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }
  .msg-row {
    display: flex;
  }
  .msg-row.user { justify-content: flex-end; }
  .msg-row.bot { justify-content: flex-start; }

  .bubble-user {
    background: var(--user-bubble);
    border: 1px solid var(--border);
    padding: 12px 16px;
    border-radius: 10px;
    max-width: 70%;
    white-space: pre-wrap;
  }
  .bubble-bot {
    background: var(--bot-card);
    border: 1px solid var(--border);
    padding: 16px 20px;
    border-radius: 10px;
    max-width: 85%;
    white-space: pre-wrap;
    line-height: 1.5;
  }
  .typing {
    color: var(--text-dim);
    font-style: italic;
    font-size: 0.9rem;
  }
  #input-bar {
    display: flex;
    gap: 10px;
    padding: 16px 32px 24px 32px;
  }
  #msg-input {
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 14px 18px;
    border-radius: 24px;
    font-size: 1rem;
    outline: none;
  }
  #msg-input:focus { border-color: var(--accent); }
  #send-btn {
    background: var(--accent);
    border: none;
    color: #1a1a1a;
    width: 48px;
    height: 48px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1.2rem;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  #send-btn:disabled { opacity: 0.5; cursor: default; }
  #send-btn:hover:not(:disabled) { filter: brightness(1.1); }
  footer {
    text-align: center;
    color: var(--text-dim);
    font-size: 0.75rem;
    padding-bottom: 14px;
  }
</style>
</head>
<body>

<header>
  <h1><span id="store-emoji">🛍️</span> <span id="store-title">Chatbot de PM Soluciones Tecnológicas</span></h1>
  <p id="store-subtitle">¡Hola! Estoy aquí para ayudarte en tu compra.</p>
</header>

<div id="chat-panel">
  <div id="chat-tab">💬 Chat</div>
  <div id="messages"></div>
</div>

<div id="input-bar">
  <input id="msg-input" type="text" placeholder="Escribe tu mensaje..." autocomplete="off" />
  <button id="send-btn" aria-label="Enviar">➤</button>
</div>

<footer>Impulsado por Claude (Anthropic) · Agente RAG con LangChain</footer>

<script>
  const CHAT_ENDPOINT = "/chat";

  const SESSION_KEY = "ecommerce_agent_session_id";
  let sessionId = sessionStorage.getItem(SESSION_KEY);
  if (!sessionId) {
    sessionId = "web-" + Math.random().toString(36).slice(2, 10);
    sessionStorage.setItem(SESSION_KEY, sessionId);
  }

  const messagesEl = document.getElementById("messages");
  const inputEl = document.getElementById("msg-input");
  const sendBtn = document.getElementById("send-btn");

  function addUserMessage(text) {
    const row = document.createElement("div");
    row.className = "msg-row user";
    row.innerHTML = `<div class="bubble-user"></div>`;
    row.firstChild.textContent = text;
    messagesEl.appendChild(row);
    scrollToBottom();
  }

  function addBotMessage(text) {
    const row = document.createElement("div");
    row.className = "msg-row bot";
    row.innerHTML = `<div class="bubble-bot"></div>`;
    row.firstChild.textContent = text;
    messagesEl.appendChild(row);
    scrollToBottom();
  }

  function addTypingIndicator() {
    const row = document.createElement("div");
    row.className = "msg-row bot";
    row.id = "typing-row";
    row.innerHTML = `<div class="bubble-bot typing">Escribiendo…</div>`;
    messagesEl.appendChild(row);
    scrollToBottom();
  }

  function removeTypingIndicator() {
    const row = document.getElementById("typing-row");
    if (row) row.remove();
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    addUserMessage(text);
    inputEl.value = "";
    sendBtn.disabled = true;
    addTypingIndicator();

    try {
      const resp = await fetch(CHAT_ENDPOINT, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text, session_id: sessionId }),
      });

      removeTypingIndicator();

      if (!resp.ok) {
        addBotMessage("Lo siento, ocurrió un error al procesar tu mensaje. Intenta de nuevo en un momento.");
        return;
      }

      const data = await resp.json();
      addBotMessage(data.reply);
    } catch (err) {
      removeTypingIndicator();
      addBotMessage("No pude conectarme con el servidor. Revisa tu conexión e intenta de nuevo.");
    } finally {
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  sendBtn.addEventListener("click", sendMessage);
  inputEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter") sendMessage();
  });

  addBotMessage("¡Hola! 👋 Soy tu asistente virtual. ¿En qué puedo ayudarte hoy?");
</script>

</body>
</html>
